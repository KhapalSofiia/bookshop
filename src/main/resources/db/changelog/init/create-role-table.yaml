databaseChangeLog:
  - changeSet:
      id: create-role-table
      author: Khapal Sofiia
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
        - sql:
            sql: ALTER TABLE roles ADD CONSTRAINT chk_roles_name CHECK (name IN ('ADMIN','USER'));