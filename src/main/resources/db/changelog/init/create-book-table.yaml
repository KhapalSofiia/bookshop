databaseChangeLog:
  - changeSet: 
      id: create-book-table
      author: Khapal Sofiia
      changes:
        - createTable:
            tableName: books
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: author
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: isbn
                  type: varchar
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: price
                  type: numeric(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar
              - column:
                  name: cover_image
                  type: varchar
              - column:
                  name: is_deleted
                  type: boolean
                  constraints:
                    nullable: false
