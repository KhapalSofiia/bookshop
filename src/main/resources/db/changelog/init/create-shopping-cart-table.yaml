databaseChangeLog:
  - changeSet:
      id: create-shopping-cart-table
      author: Khapal Sofiia
      changes:
        - createTable:
            tableName: shopping_carts
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    nullable: false
                    primaryKey: true
                    foreignKeyName: fk_cart_user
                    references: users(id)
              - column:
                  name: is_deleted
                  type: boolean
                  constraints:
                    nullable: false
