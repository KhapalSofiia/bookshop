databaseChangeLog:
  - changeSet: 
      id: create-book-table
      author: Khapal Sofiia
      changes:
        - createTable:
            tableName: books
            columns:
              - column:
                  name: id
                  type: long varbinary
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: author
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: isdn
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: big decimal
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar
              - column:
                  name: cover_image
                  type: varchar
              - column:
                  name: is_deleted
                  type: varchar
                  constraints:
                    nullable: false
